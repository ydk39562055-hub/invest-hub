</div><div id="tip"></div><script>
(function(){
 var tip=document.getElementById('tip');
 document.querySelectorAll('.flow .rb').forEach(function(p){
  p.addEventListener('mouseenter',function(){tip.textContent=p.dataset.t;tip.style.display='block';});
  p.addEventListener('mousemove',function(e){
   var x=e.clientX+14,y=e.clientY+14,r=tip.getBoundingClientRect();
   if(x+r.width>window.innerWidth)x=e.clientX-r.width-14;
   if(y+r.height>window.innerHeight)y=e.clientY-r.height-14;
   tip.style.left=x+'px';tip.style.top=y+'px';
  });
  p.addEventListener('mouseleave',function(){tip.style.display='none';});
 });
})();
</script></body></html>
