<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>매크로 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{--bg:#15100d;--line:#2b231c;--accent:#c89468}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{display:flex;flex-direction:column;background:var(--bg);color:#cfc2b0}
  .topbar{background:#1e1711;color:#f2ebe0;
    padding:14px 26px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .brand{font-weight:800;font-size:17px;letter-spacing:-.3px;color:#f2ebe0}
  .brand small{display:block;font-weight:500;font-size:11px;color:#a08f7d;letter-spacing:1.5px}
  .tabs{display:flex;gap:8px;margin-left:auto}
  .tab{appearance:none;border:1px solid #3a2f24;background:transparent;color:#cfc2b0;
    padding:8px 16px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .tab:hover{background:#2b231c}
  .tab.on{background:var(--accent);color:#1a1512;border-color:var(--accent)}
  .desc{width:100%;color:#a08f7d;font-size:12.5px;margin-top:2px}
  .frameWrap{flex:1;position:relative;background:var(--bg)}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">매크로 대시보드<small>BOTTOM-UP MOSAIC · TOP-DOWN FRED</small></div>
    <div class="tabs">
      <button class="tab on" data-src="reports/macro-leading.html">거시 선행지표 <span style="opacity:.7">· 탑다운/FRED</span></button>
      <button class="tab" data-src="reports/macro-report.html">바텀업 모자이크 <span style="opacity:.7">· 기업 증언</span></button>
    </div>
    <div class="desc" id="desc">FRED에서 매일 자동 갱신되는 거시 선행지표(금리·고용·신용·물가)입니다. 위 탭으로 두 층을 전환하세요.</div>
  </div>
  <div class="frameWrap"><iframe id="view" src="reports/macro-leading.html"></iframe></div>
  <script>
    var DESC = {
      "reports/macro-leading.html": "FRED에서 매일 자동 갱신되는 거시 선행지표(금리·고용·신용·물가)입니다. 위 탭으로 두 층을 전환하세요.",
      "reports/macro-report.html": "기업 어닝콜·공시(말 vs 행동)에서 모은 바텀업 모자이크입니다. 분기마다 수동 갱신."
    };
    document.querySelectorAll(".tab").forEach(function(b){
      b.addEventListener("click", function(){
        document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on")});
        b.classList.add("on");
        var src = b.dataset.src;
        document.getElementById("view").src = src;
        document.getElementById("desc").textContent = DESC[src];
      });
    });
  </script>
</body>
</html>
