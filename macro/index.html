<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>매크로 대시보드</title>
<style>
  :root{--ink:#16243a;--line:#dde3ea;--bg:#eef1f5}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif}
  body{display:flex;flex-direction:column;background:var(--bg)}
  .topbar{background:linear-gradient(135deg,#0e1f33,#21466f);color:#fff;
    padding:14px 26px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .brand{font-weight:800;font-size:17px;letter-spacing:-.3px}
  .brand small{display:block;font-weight:500;font-size:11.5px;color:#9db6d6;letter-spacing:1px}
  .tabs{display:flex;gap:8px;margin-left:auto}
  .tab{appearance:none;border:1px solid #3a5f8a;background:transparent;color:#cfe0f2;
    padding:8px 16px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer}
  .tab:hover{background:#27466b}
  .tab.on{background:#fff;color:#16243a;border-color:#fff}
  .desc{width:100%;color:#aec3de;font-size:12.5px;margin-top:2px}
  .frameWrap{flex:1;position:relative;background:#fff}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">매크로 대시보드<small>BOTTOM-UP MOSAIC · TOP-DOWN FRED</small></div>
    <div class="tabs">
      <button class="tab on" data-src="reports/macro-leading.html">거시 선행지표 <span style="opacity:.7">· 탑다운/FRED</span></button>
      <button class="tab" data-src="reports/macro-report.html">바텀업 모자이크 <span style="opacity:.7">· 기업 증언</span></button>
    </div>
    <div class="desc" id="desc">FRED에서 매일 자동 갱신되는 거시 선행지표(금리·고용·신용·물가)입니다. 위 탭으로 두 층을 전환하세요.</div>
  </div>
  <div class="frameWrap"><iframe id="view" src="reports/macro-leading.html"></iframe></div>
  <script>
    var DESC = {
      "reports/macro-leading.html": "FRED에서 매일 자동 갱신되는 거시 선행지표(금리·고용·신용·물가)입니다. 위 탭으로 두 층을 전환하세요.",
      "reports/macro-report.html": "기업 어닝콜·공시(말 vs 행동)에서 모은 바텀업 모자이크입니다. 분기마다 수동 갱신."
    };
    document.querySelectorAll(".tab").forEach(function(b){
      b.addEventListener("click", function(){
        document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on")});
        b.classList.add("on");
        var src = b.dataset.src;
        document.getElementById("view").src = src;
        document.getElementById("desc").textContent = DESC[src];
      });
    });
  </script>
</body>
</html>
