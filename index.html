<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>투자 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  /* 브라운 리디자인 토큰 (handoff_브라운_대시보드) */
  :root{--bg:#15100d;--bar:#120e0b;--panel:#221b15;--panel2:#261e16;--line:#3a2f24;
    --txt:#f2ebe0;--mut:#a08f7d;--accent:#c89468;--hover:#1e1712}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--txt);
    font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  header{flex:none;background:var(--bar);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:10px 16px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:15px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .logo .dot{width:8px;height:8px;border-radius:2px;background:var(--accent);display:inline-block}
  nav{display:flex;gap:3px;flex-wrap:wrap;margin-left:8px}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);padding:7px 13px;border-radius:9px;cursor:pointer;font-size:13.5px;font-family:inherit;white-space:nowrap}
  nav button:hover{color:var(--txt);background:var(--hover)}
  nav button.on{background:var(--panel2);color:var(--txt);border-color:var(--line)}
  .spacer{margin-left:auto;color:var(--mut);font-size:12px}
  main{flex:1;position:relative;min-height:0}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:14px;pointer-events:none;opacity:0;transition:opacity .2s}
  .loading.show{opacity:1}
  @media(max-width:640px){.logo{font-size:13px} nav button{padding:6px 9px;font-size:12.5px}}
</style>
</head>
<body>
<header>
  <span class="logo"><span class="dot"></span>투자 대시보드</span>
  <nav id="nav"></nav>
  <span class="spacer" id="meta"></span>
</header>
<main>
  <div class="loading" id="loading">불러오는 중…</div>
  <iframe id="frame" title="tool"></iframe>
</main>
<script>
const TOOLS = [
  {id:"cycle",   name:"경기순환",   url:"https://ydk39562055-hub.github.io/cycle-checklist/"},
  {id:"rotation",name:"로테이션",   url:"https://ydk39562055-hub.github.io/rotation-lab/"},
  {id:"growth",  name:"성장가속",   url:"https://ydk39562055-hub.github.io/growth-signal-reports/"},
  {id:"macro",   name:"매크로",     url:"./macro/"},
  {id:"valley",  name:"산업 사이클", url:"./valley/"},
  {id:"gold",    name:"금 레짐",    url:"https://ydk39562055-hub.github.io/gold-regime/"},
  {id:"us",      name:"주도주·미국", url:"./radar-us/"},
  {id:"kr",      name:"주도주·한국", url:"./radar-kr/"},
  {id:"digest",  name:"뉴스 다이제스트", url:"https://ydk39562055-hub.github.io/telegram-digest/"},
];
const nav=document.getElementById('nav'), frame=document.getElementById('frame'), loading=document.getElementById('loading');
let cur=null;
function go(id){
  const t=TOOLS.find(x=>x.id===id)||TOOLS[0];
  cur=t.id;
  [...nav.children].forEach(b=>b.classList.toggle('on',b.dataset.id===t.id));
  loading.classList.add('show');
  frame.src=t.url;
  if(location.hash.slice(1)!==t.id) history.replaceState(null,'','#'+t.id);
  try{localStorage.setItem('hub_last',t.id);}catch(e){}
}
frame.addEventListener('load',()=>loading.classList.remove('show'));
TOOLS.forEach(t=>{
  const b=document.createElement('button'); b.dataset.id=t.id;
  b.textContent=t.name;
  b.onclick=()=>go(t.id); nav.appendChild(b);
});
const start=location.hash.slice(1) || (function(){try{return localStorage.getItem('hub_last')}catch(e){return null}})() || TOOLS[0].id;
go(TOOLS.find(t=>t.id===start)?start:TOOLS[0].id);
window.addEventListener('hashchange',()=>{const h=location.hash.slice(1); if(h&&h!==cur) go(h);});
</script>
</body>
</html>
